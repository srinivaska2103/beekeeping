<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 448 512' fill='%23f59e0b'><path d='M448 160c0-17.7-14.3-32-32-32h-32v-16c0-44.2-35.8-80-80-80H144c-44.2 0-80 35.8-80 80v16H32c-17.7 0-32 14.3-32 32v64c0 17.7 14.3 32 32 32h384c17.7 0 32-14.3 32-32v-64zM160 416c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32s-14.3 32-32 32h-64c-17.7 0-32-14.3-32-32zm256-128H32c-17.7 0-32 14.3-32 32v96c0 88.4 71.6 160 160 160h128c88.4 0 160-71.6 160-160v-96c0-17.7-14.3-32-32-32z'/></svg>">
    <title>404 - Page Not Found | GoldenHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes bee-path {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(10deg); }
            50% { transform: translate(-10px, -40px) rotate(-10deg); }
            75% { transform: translate(-30px, -20px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .animate-bee-lost {
            animation: bee-path 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300 min-h-screen flex flex-col">

    <nav class="w-full p-6 flex justify-between items-center fixed top-0 left-0 z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <span class="text-3xl text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.4)] transition-transform group-hover:scale-110">
                <i class="fa-solid fa-jar"></i>
            </span>
            <span class="font-bold text-xl uppercase tracking-tighter dark:text-white">
                Golden<span class="text-primary">Hive</span>
            </span>
        </a>

        <div class="flex items-center gap-3">
            <button onclick="toggleDirection()" class="p-2 w-10 h-10 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                <i class="fa-solid fa-right-left text-sm"></i>
            </button>
            <button onclick="toggleTheme()" class="p-2 w-10 h-10 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pt-20">
        <div class="max-w-2xl w-full text-center">
            <div class="relative inline-block mb-8">
                <h1 class="text-[120px] md:text-[200px] font-black leading-none text-zinc-100 dark:text-zinc-900 select-none">
                    404
                </h1>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="text-6xl md:text-8xl text-primary animate-bee-lost">
                        <i class="fa-solid fa-bee"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-3xl md:text-5xl font-black dark:text-white">Oops! The bee flew off course.</h2>
                <p class="text-lg text-zinc-500 dark:text-zinc-400 max-w-md mx-auto leading-relaxed">
                    The page you are looking for has been moved, removed, or perhaps it never existed in our hive. 
                </p>
                
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-6">
                    <a href="index.html" class="w-full sm:w-auto px-10 py-4 bg-zinc-900 dark:bg-primary text-white dark:text-zinc-900 font-black rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                        Back to the Hive
                    </a>
                    <a href="contact.html" class="w-full sm:w-auto px-10 py-4 border-2 border-zinc-100 dark:border-zinc-800 font-bold rounded-2xl hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all">
                        Report an Issue
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-xs text-zinc-400 uppercase tracking-widest font-bold">
        © 2026 GoldenHive Apiary • All Rights Reserved
    </footer>

    <script>
        const html = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');

        // Persistence Logic (Same as Login/Sign-up)
        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') {
                html.classList.add('dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
            if (localStorage.getItem('dir') === 'rtl') {
                html.setAttribute('dir', 'rtl');
            }
        };

        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        function toggleDirection() {
            const currentDir = html.getAttribute('dir');
            const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            localStorage.setItem('dir', newDir);
        }
    </script>
</body>
</html>
