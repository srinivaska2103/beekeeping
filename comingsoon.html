<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 448 512' fill='%23f59e0b'><path d='M448 160c0-17.7-14.3-32-32-32h-32v-16c0-44.2-35.8-80-80-80H144c-44.2 0-80 35.8-80 80v16H32c-17.7 0-32 14.3-32 32v64c0 17.7 14.3 32 32 32h384c17.7 0 32-14.3 32-32v-64zM160 416c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32s-14.3 32-32 32h-64c-17.7 0-32-14.3-32-32zm256-128H32c-17.7 0-32 14.3-32 32v96c0 88.4 71.6 160 160 160h128c88.4 0 160-71.6 160-160v-96c0-17.7-14.3-32-32-32z'/></svg>">
    <title>Coming Soon | GoldenHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        /* Prevents all scrolling and "rubber-banding" on mobile devices */
        html, body {
            overflow: hidden;
            height: 100%;
            position: fixed;
            width: 100%;
        }
        
        /* Ensures the countdown blocks remain perfectly square and centered */
        .countdown-item {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300 h-screen w-full flex flex-col">

    <nav class="w-full p-4 md:p-6 flex justify-between items-center absolute top-0 left-0 z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <span class="text-2xl md:text-3xl text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.4)] transition-transform group-hover:scale-110">
                <i class="fa-solid fa-jar"></i>
            </span>
            <span class="font-bold text-lg md:text-xl uppercase tracking-tighter dark:text-white">
                Golden<span class="text-primary">Hive</span>
            </span>
        </a>

        <div class="flex items-center gap-2 md:gap-3">
            <button onclick="toggleDirection()" class="p-2 w-9 h-9 md:w-10 md:h-10 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                <i class="fa-solid fa-right-left text-xs md:text-sm"></i>
            </button>
            <button onclick="toggleTheme()" class="p-2 w-9 h-9 md:w-10 md:h-10 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                <i id="theme-icon" class="fa-solid fa-moon text-xs md:text-sm"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4 md:px-6 pt-16 pb-12 overflow-hidden">
        <div class="max-w-4xl w-full text-center">
            
            <div class="inline-flex items-center gap-2 px-3 py-1.5 md:px-4 md:py-2 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-full text-[10px] md:text-xs font-black uppercase tracking-widest mb-4 md:mb-8 animate-pulse">
                <i class="fa-solid fa-clock"></i> Something Sweet is Brewing
            </div>

            <h1 class="text-3xl sm:text-5xl md:text-8xl font-black mb-4 md:mb-8 dark:text-white leading-tight">
                Our New Hive is <br> <span class="text-primary">Almost Ready.</span>
            </h1>

            <div class="grid grid-cols-4 gap-2 md:gap-8 mb-8 md:mb-16 max-w-3xl mx-auto">
                <div class="countdown-item bg-white dark:bg-zinc-900 rounded-xl md:rounded-[2rem] shadow-xl border border-zinc-100 dark:border-zinc-800">
                    <span id="days" class="block text-xl md:text-6xl font-black text-primary leading-none">00</span>
                    <span class="text-[8px] md:text-xs font-bold uppercase tracking-widest text-zinc-400 mt-1">Days</span>
                </div>
                <div class="countdown-item bg-white dark:bg-zinc-900 rounded-xl md:rounded-[2rem] shadow-xl border border-zinc-100 dark:border-zinc-800">
                    <span id="hours" class="block text-xl md:text-6xl font-black text-primary leading-none">00</span>
                    <span class="text-[8px] md:text-xs font-bold uppercase tracking-widest text-zinc-400 mt-1">Hours</span>
                </div>
                <div class="countdown-item bg-white dark:bg-zinc-900 rounded-xl md:rounded-[2rem] shadow-xl border border-zinc-100 dark:border-zinc-800">
                    <span id="minutes" class="block text-xl md:text-6xl font-black text-primary leading-none">00</span>
                    <span class="text-[8px] md:text-xs font-bold uppercase tracking-widest text-zinc-400 mt-1">Mins</span>
                </div>
                <div class="countdown-item bg-white dark:bg-zinc-900 rounded-xl md:rounded-[2rem] shadow-xl border border-zinc-100 dark:border-zinc-800">
                    <span id="seconds" class="block text-xl md:text-6xl font-black text-primary leading-none">00</span>
                    <span class="text-[8px] md:text-xs font-bold uppercase tracking-widest text-zinc-400 mt-1">Secs</span>
                </div>
            </div>

            <div class="max-w-md mx-auto px-2">
                <p class="mb-4 md:mb-6 text-xs md:text-base text-zinc-500 dark:text-zinc-400 font-medium">Be the first to know when we launch!</p>
                <form class="flex flex-col sm:flex-row gap-2 md:gap-3" onsubmit="return false;">
                    <input type="email" placeholder="Your email address" class="w-full px-4 py-3 md:px-6 md:py-4 rounded-xl md:rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 focus:border-primary outline-none transition-all shadow-sm text-sm" required>
                    <button type="submit" class="px-6 py-3 md:px-8 md:py-4 bg-zinc-900 dark:bg-primary text-white dark:text-zinc-900 font-black rounded-xl md:rounded-2xl hover:scale-105 transition-all text-xs uppercase tracking-widest">
                        Notify Me
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="w-full pb-6 md:pb-12 flex flex-col items-center gap-4">
        <div class="flex gap-6 md:gap-8 text-lg md:text-xl text-zinc-400">
            <a href="#" class="hover:text-primary transition-colors"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="hover:text-primary transition-colors"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" class="hover:text-primary transition-colors"><i class="fa-brands fa-twitter"></i></a>
        </div>
        <p class="text-[8px] md:text-[10px] text-zinc-400 uppercase tracking-widest font-bold">© 2026 GoldenHive Apiary</p>
    </footer>

    <script>
        const html = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') {
                html.classList.add('dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
            if (localStorage.getItem('dir') === 'rtl') {
                html.setAttribute('dir', 'rtl');
            }
            startCountdown();
        };

        function toggleTheme() {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
        }

        function toggleDirection() {
            const currentDir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', currentDir);
            localStorage.setItem('dir', currentDir);
        }

        function startCountdown() {
            const launchDate = new Date();
            launchDate.setDate(launchDate.getDate() + 30);

            setInterval(() => {
                const now = new Date().getTime();
                const distance = launchDate - now;

                document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }, 1000);
        }
    </script>
</body>
</html>
