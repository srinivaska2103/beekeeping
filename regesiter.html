<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 448 512' fill='%23f59e0b'><path d='M448 160c0-17.7-14.3-32-32-32h-32v-16c0-44.2-35.8-80-80-80H144c-44.2 0-80 35.8-80 80v16H32c-17.7 0-32 14.3-32 32v64c0 17.7 14.3 32 32 32h384c17.7 0 32-14.3 32-32v-64zM160 416c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32s-14.3 32-32 32h-64c-17.7 0-32-14.3-32-32zm256-128H32c-17.7 0-32 14.3-32 32v96c0 88.4 71.6 160 160 160h128c88.4 0 160-71.6 160-160v-96c0-17.7-14.3-32-32-32z'/></svg>">
    <title>Sign Up | GoldenHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        /* Force the body to be exactly the viewport height and disable scrolling */
        html, body {
            overflow: hidden;
            height: 100%;
            position: fixed;
            width: 100%;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300 h-screen w-full flex flex-col">

    <nav class="w-full p-4 md:p-6 flex justify-between items-center absolute top-0 left-0 z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <span class="text-2xl md:text-3xl text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.4)] transition-transform group-hover:scale-110">
                <i class="fa-solid fa-jar"></i>
            </span>
            <span class="font-bold text-lg md:text-xl uppercase tracking-tighter dark:text-white">
                Golden<span class="text-primary">Hive</span>
            </span>
        </a>

        <div class="flex items-center gap-2 md:gap-3">
            <button onclick="toggleDirection()" class="p-2 w-9 h-9 md:w-10 md:h-10 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                <i class="fa-solid fa-right-left text-xs md:text-sm"></i>
            </button>
            <button onclick="toggleTheme()" class="p-2 w-9 h-9 md:w-10 md:h-10 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/50 dark:bg-zinc-900/50 backdrop-blur-sm flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                <i id="theme-icon" class="fa-solid fa-moon text-xs md:text-sm"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 h-full w-full overflow-hidden">
        <div class="w-full max-w-md bg-white dark:bg-zinc-900 rounded-[2rem] md:rounded-[2.5rem] p-5 md:p-10 shadow-2xl border border-zinc-100 dark:border-zinc-800 transition-all">
            
            <div class="text-center mb-4 md:mb-8">
                <h1 class="text-2xl md:text-3xl font-black mb-1">Create Account</h1>
                <p class="text-xs md:text-sm text-zinc-500 dark:text-zinc-400">Join our hive today</p>
            </div>

            <form action="#" class="space-y-3 md:space-y-5" onsubmit="return false;">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1 ml-1">Full Name</label>
                    <input type="text" placeholder="enter your name" class="w-full px-4 py-2.5 md:py-4 rounded-xl md:rounded-2xl bg-zinc-50 dark:bg-zinc-800 border border-transparent focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all dark:text-white text-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1 ml-1">Email Address</label>
                    <input type="email" placeholder="name@example.com" class="w-full px-4 py-2.5 md:py-4 rounded-xl md:rounded-2xl bg-zinc-50 dark:bg-zinc-800 border border-transparent focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all dark:text-white text-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1 ml-1">Password</label>
                    <div class="relative">
                        <input id="password" type="password" placeholder="••••••••" class="w-full px-4 py-2.5 md:py-4 rounded-xl md:rounded-2xl bg-zinc-50 dark:bg-zinc-800 border border-transparent focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all dark:text-white text-sm">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-primary">
                            <i id="eye-icon" class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-2 text-[11px] md:text-xs py-1">
                    <input type="checkbox" class="h-4 w-4 rounded border-zinc-300 dark:border-zinc-700 accent-primary" required>
                    <span class="text-zinc-500 dark:text-zinc-400">
                        I agree to the <a href="#" class="text-primary font-bold">Terms of Service</a>
                    </span>
                </div>

                <button type="submit" class="w-full py-3.5 md:py-4 bg-zinc-900 dark:bg-primary text-white dark:text-zinc-900 font-black rounded-xl md:rounded-2xl shadow-xl hover:scale-[1.01] active:scale-95 transition-all text-sm uppercase tracking-wider">
                    Register Now
                </button>
            </form>

            <div class="flex items-center gap-3 my-4 md:my-8">
                <div class="h-px bg-zinc-100 dark:bg-zinc-800 flex-grow"></div>
                <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Sign up with</span>
                <div class="h-px bg-zinc-100 dark:bg-zinc-800 flex-grow"></div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button class="flex items-center justify-center py-2.5 bg-zinc-50 dark:bg-zinc-800 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-all">
                    <i class="fa-brands fa-google text-lg"></i>
                </button>
                <button class="flex items-center justify-center py-2.5 bg-zinc-50 dark:bg-zinc-800 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-all">
                    <i class="fa-brands fa-facebook-f text-lg"></i>
                </button>
                <button class="flex items-center justify-center py-2.5 bg-zinc-50 dark:bg-zinc-800 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-all">
                    <i class="fa-brands fa-apple text-lg"></i>
                </button>
            </div>

            <p class="mt-6 text-center text-zinc-500 dark:text-zinc-400 text-[11px] md:text-xs">
                Already have an account? <a href="login.html" class="text-primary font-black hover:underline">Log In</a>
            </p>

        </div>
    </main>

    <script>
        const html = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') {
                html.classList.add('dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
            if (localStorage.getItem('dir') === 'rtl') {
                html.setAttribute('dir', 'rtl');
            }
        };

        function toggleTheme() {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
        }

        function toggleDirection() {
            const currentDir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', currentDir);
            localStorage.setItem('dir', currentDir);
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeIcon.classList.replace(isPass ? 'fa-eye' : 'fa-eye-slash', isPass ? 'fa-eye-slash' : 'fa-eye');
        }
    </script>
</body>
</html>
